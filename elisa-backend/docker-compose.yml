version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: elisa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elisa_prod
      POSTGRES_USER: elisa_user
      POSTGRES_PASSWORD: elisa_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elisa_user -d elisa_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: elisa_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bintangtoedjoe.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
